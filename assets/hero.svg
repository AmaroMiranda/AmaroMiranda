<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="100%" role="img" aria-label="Amaro Miranda — Front-end e Mobile Developer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0F1E"/>
      <stop offset="100%" stop-color="#101B33"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4A9EFF"/>
      <stop offset="55%" stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1F6FEB"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#1E3A5F" stroke-width="0.5" opacity="0.35"/>
    </pattern>
    <style>
      .title { font: 800 46px 'Segoe UI', Arial, sans-serif; letter-spacing: 5px; }
      .subtitle { font: 600 17px 'Segoe UI', Arial, sans-serif; letter-spacing: 4px; fill: #94A3B8; }
      .tag { font: 400 13px 'Segoe UI', Arial, sans-serif; letter-spacing: 1.5px; fill: #64748B; }
      .code { font: 500 12px 'Cascadia Code', 'Fira Code', Consolas, monospace; }

      .cursor { animation: blink 1.1s steps(1) infinite; }
      @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

      .line { transform-origin: left center; animation: typeIn 6s ease-out infinite; }
      .l2 { animation-delay: .5s; }
      .l3 { animation-delay: 1s; }
      .l4 { animation-delay: 1.5s; }
      .l5 { animation-delay: 2s; }
      @keyframes typeIn {
        0%   { transform: scaleX(0); }
        8%   { transform: scaleX(0); }
        22%  { transform: scaleX(1); }
        88%  { transform: scaleX(1); opacity: 1; }
        96%  { opacity: 0; }
        100% { transform: scaleX(0); opacity: 1; }
      }

      .float { animation: drift 7s ease-in-out infinite; }
      .f2 { animation-delay: 2.3s; }
      .f3 { animation-delay: 4.6s; }
      @keyframes drift {
        0%, 100% { transform: translateY(0); opacity: .5; }
        50%      { transform: translateY(-14px); opacity: 1; }
      }

      .pulseBar { animation: grow 4s ease-in-out infinite; transform-origin: left center; }
      @keyframes grow {
        0%, 100% { transform: scaleX(.55); }
        50%      { transform: scaleX(1); }
      }

      .star { fill: #E2E8F0; animation: twinkle 4s ease-in-out infinite; }
      .s2 { animation-delay: 1.3s; }
      .s3 { animation-delay: 2.6s; }
      @keyframes twinkle { 0%, 100% { opacity: .15; } 50% { opacity: .6; } }
    </style>
  </defs>

  <!-- Fundo -->
  <rect width="900" height="300" fill="url(#bg)"/>
  <rect width="900" height="300" fill="url(#grid)"/>

  <!-- Easter egg discreto: mini céu no canto -->
  <g opacity="0.55">
    <circle class="star"    cx="835" cy="34" r="1.3"/>
    <circle class="star s2" cx="862" cy="58" r="1.1"/>
    <circle class="star s3" cx="808" cy="70" r="1.0"/>
    <circle cx="852" cy="42" r="9" fill="#CBD5E1" opacity="0.7"/>
    <circle cx="849" cy="39" r="2.4" fill="#94A3B8" opacity="0.6"/>
  </g>

  <!-- Janela de código -->
  <g>
    <rect x="70" y="62" width="240" height="176" rx="12" fill="#0D1526" stroke="#1E3A5F" stroke-width="1.5"/>
    <rect x="70" y="62" width="240" height="34" rx="12" fill="#13203A"/>
    <rect x="70" y="84" width="240" height="12" fill="#13203A"/>
    <circle cx="92" cy="79" r="5" fill="#FF5F57"/>
    <circle cx="110" cy="79" r="5" fill="#FEBC2E"/>
    <circle cx="128" cy="79" r="5" fill="#28C840"/>
    <text x="150" y="84" class="code" fill="#64748B">app.tsx</text>

    <!-- Linhas de código digitando -->
    <rect class="line"    x="90" y="112" width="150" height="9" rx="4.5" fill="#1F6FEB"/>
    <rect class="line l2" x="106" y="134" width="180" height="9" rx="4.5" fill="#334E68"/>
    <rect class="line l3" x="106" y="156" width="130" height="9" rx="4.5" fill="#22D3EE"/>
    <rect class="line l4" x="106" y="178" width="165" height="9" rx="4.5" fill="#334E68"/>
    <rect class="line l5" x="90" y="200" width="95" height="9" rx="4.5" fill="#1F6FEB"/>
    <rect class="cursor" x="192" y="197" width="7" height="14" rx="2" fill="#7DD3FC"/>
  </g>

  <!-- Símbolos flutuando -->
  <g class="code" font-size="20" font-weight="600">
    <text class="float"    x="360" y="70"  fill="#1F6FEB" opacity="0.6">&lt;/&gt;</text>
    <text class="float f2" x="795" y="215" fill="#22D3EE" opacity="0.6">{ }</text>
    <text class="float f3" x="352" y="252" fill="#334E68">=&gt;</text>
  </g>

  <!-- Nome e título -->
  <text x="560" y="132" text-anchor="middle" class="title" fill="url(#titleGrad)" filter="url(#glow)">AMARO MIRANDA</text>
  <rect class="pulseBar" x="415" y="148" width="290" height="4" rx="2" fill="url(#bar)"/>
  <text x="560" y="182" text-anchor="middle" class="subtitle">FRONT-END &amp; MOBILE DEVELOPER</text>
  <text x="560" y="212" text-anchor="middle" class="tag">React · Flutter · interfaces modernas com performance e UX</text>

  <!-- Base -->
  <rect y="294" width="900" height="6" fill="#0A0F1E"/>
</svg>
